version: '3'

tasks:
  up:
    desc: "Set up development environment (install deps, verify toolchain)"
    cmds:
      - |
        echo "==> Checking Node.js..."
        if ! command -v node &>/dev/null; then
          echo "Error: node is required. Install via fnm: https://github.com/Schniz/fnm"
          exit 1
        fi
        echo "  node $(node --version)"
      - |
        echo "==> Checking npm..."
        if ! command -v npm &>/dev/null; then
          echo "Error: npm is required."
          exit 1
        fi
        echo "  npm $(npm --version)"
      - |
        echo "==> Checking pi..."
        if ! command -v pi &>/dev/null; then
          echo "Error: pi is required. Install with: npm install -g @mariozechner/pi-coding-agent"
          exit 1
        fi
        echo "  pi $(pi --version 2>/dev/null || echo '(version unavailable)')"
      - |
        echo "==> Installing npm dependencies..."
        npm install -g 0x
        npm install
        echo "  ✓ Dependencies installed"
      - |
        ln -s $HOME/.pi/agent/sessions tmp/sessions
        echo " "
        echo "✓ session files can be found in ./tmp/sessions/"
      - |
        ln -s /tmp/logs/pi-minions tmp/logs
        echo ""
        echo "✓ debug logs can be found in ./tmp/logs/"
      - |
        echo ""
        echo "✓ Development environment ready."
        echo ""
        echo "  task test        run unit tests"
        echo "  task typecheck   TypeScript type check"
        echo "  task dev         load extension into pi"
        echo "  task test:e2e    smoke test in pi print mode"

  cleanup:
    desc: "Clean up all logs and tmp test files"
    env:
      PI_MINIONS_DEBUG: "1"
    cmds:
      - |
        rm -rf /tmp/logs/pi-minions/minions/*.log
        rm -rf $HOME/.pi/agent/sessions/*tmp-pi-minions-test*

  dev:
    desc: "Load extension into pi. Open 'task logs' in a second terminal to see debug output."
    env:
      PI_MINIONS_DEBUG: "1"
    cmds:
      - mkdir -p /tmp/logs/pi-minions/
      # Rotate: keep last session as .prev so nothing is lost
      - |
        if [ -s /tmp/logs/pi-minions/debug.log ]; then
          cp /tmp/logs/pi-minions/debug.log /tmp/logs/pi-minions/debug.prev.log
        fi
      - echo "" > /tmp/logs/pi-minions/debug.log
      - |
        echo ""
        echo "  ┌───────────────────────────────────────────-──┐"
        echo "  │  pi-minions dev session starting             │"
        echo "  │  Open a second terminal and run: task logs   │"
        echo "  │  Log: ./tmp/logs/pi-minions/debug.log                   │"
        echo "  └───────────────────────────────────────────-──┘"
        echo ""
      - pi -e ./src/index.ts

  typecheck:
    desc: "Run TypeScript type checker"
    cmds:
      - npx tsc --noEmit

  test:
    desc: "Run unit tests"
    vars:
      JSON_FLAG: '{{.json | default "false"}}'
    cmds:
      - |
        if [ "{{.JSON_FLAG}}" = "true" ]; then
          npx vitest run --reporter=json
        else
          npx vitest run
        fi
    silent: true

  test:e2e:
    desc: "Run e2e safety control tests against real pi + LLM (usage: task test:e2e [-- filter])"
    cmds:
      - |
        echo "e2e test suites takes quite a while, it is recommended to filter and run specific tests"
        echo " "
        echo "    $ task test:e2e -- graceful"
        echo " "
      - ./scripts/e2e.sh {{.CLI_ARGS}}
    silent: true

  logs:
    desc: "Tail debug log in real time (run in a second terminal alongside 'task dev')"
    cmds:
      - rm -rf /tmp/logs/pi-minions
      - mkdir -p /tmp/logs/pi-minions && touch /tmp/logs/pi-minions/debug.log
      - ln -s /tmp/logs/pi-minions tmp/logs
      - echo "Tailing ./tmp/logs/debug.log  (Ctrl+C to stop)"
      - tail -f -n 100 ./tmp/logs/debug.log

  test:bench:
    desc: "Run all performance tests (benchmarks + CPU profile + heap profile)"
    cmds:
      - mkdir -p tmp/profiles
      - echo "==> Running benchmark tests..."
      - npx vitest bench test/perf/ --run
      - echo "==> Running CPU profiling..."
      - NODE_OPTIONS='--cpu-prof --cpu-prof-dir=./tmp/profiles' npx vitest bench test/perf/ --run
      - echo "==> Running heap profiling..."
      - NODE_OPTIONS='--heap-prof --heap-prof-dir=./tmp/profiles' npx vitest bench test/perf/ --run
      - echo ""
      - echo "Profiles saved to tmp/profiles/"
      - ls -lh tmp/profiles/ 2>/dev/null || echo "No profiles generated"

  profile:
    desc: "Generate human-readable report and flamegraph from profiles"
    cmds:
      - |
        if command -v 0x &>/dev/null; then
          echo "==> Generating flamegraph with 0x..."
          0x --output-dir ./tmp/profiles -- node ./node_modules/.bin/vitest bench test/perf/ --run
        else
          echo "==> Skipping flamegraph (0x not installed). Install with: npm install -g 0x"
        fi
